name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
        node-version: [20]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit --skipLibCheck

      - name: Build
        run: npx vite build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: matrix.os == 'macos-latest'
        with:
          name: build-output
          path: |
            dist/
            dist-electron/
          retention-days: 7
